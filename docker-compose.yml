# docker-compose.yml — Production (All-in-one)
# This configuration uses the single All-in-one image that includes Nginx, Frontend, Backend, and Redis.

services:
  ieepa-app:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    image: 10.161.254.241/dimerco/ieepa-refund-calculator:V1.0.0
    container_name: IEEPA-Calculator-Service
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ieepa_data:/data
      # 掛載憑證至容器內 Nginx 預期路徑
      - ./certs:/etc/nginx/ssl:ro
    environment:
      - ENVIRONMENT=production
      - CORS_ORIGINS=https://localhost
      - DATABASE_URL=sqlite+aiosqlite:////data/ieepa.db
    restart: always

volumes:
  ieepa_data:
